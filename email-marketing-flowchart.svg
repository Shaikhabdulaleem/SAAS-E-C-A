<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1500" viewBox="0 0 1400 1500" role="img" aria-labelledby="title desc">
  <title id="title">Email Marketing Module Flowchart</title>
  <desc id="desc">Flowchart showing how the Email Marketing module works from UI access through campaign creation, readiness validation, queueing, worker delivery, SendGrid, and tracking events.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 16px Arial, sans-serif; fill: #334155; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .node-blue { fill: #eff6ff; stroke: #3b82f6; }
      .node-green { fill: #ecfdf5; stroke: #10b981; }
      .node-amber { fill: #fffbeb; stroke: #f59e0b; }
      .node-red { fill: #fef2f2; stroke: #ef4444; }
      .node-purple { fill: #f5f3ff; stroke: #8b5cf6; }
      .decision { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .label { font: 600 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .edge-muted { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
      .edge-label { font: 600 12px Arial, sans-serif; fill: #334155; }
      .lane { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 14; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1500"/>
  <text x="700" y="54" text-anchor="middle" class="title">Email Marketing Module Flowchart</text>
  <text x="700" y="84" text-anchor="middle" class="subtitle">UI to API to Redis worker to SendGrid, including readiness checks, suppressions, and tracking</text>

  <rect x="60" y="120" width="300" height="1210" class="lane"/>
  <rect x="390" y="120" width="340" height="1210" class="lane"/>
  <rect x="760" y="120" width="280" height="1210" class="lane"/>
  <rect x="1070" y="120" width="270" height="1210" class="lane"/>

  <text x="210" y="152" text-anchor="middle" class="lane-title">Frontend</text>
  <text x="560" y="152" text-anchor="middle" class="lane-title">Nest API</text>
  <text x="900" y="152" text-anchor="middle" class="lane-title">Database / Queue</text>
  <text x="1205" y="152" text-anchor="middle" class="lane-title">Worker / Provider</text>

  <rect x="105" y="190" width="210" height="74" class="node node-blue"/>
  <text x="210" y="220" text-anchor="middle" class="label">User opens</text>
  <text x="210" y="242" text-anchor="middle" class="small">Email Marketing UI</text>

  <rect x="105" y="305" width="210" height="82" class="node node-blue"/>
  <text x="210" y="334" text-anchor="middle" class="label">Protected route</text>
  <text x="210" y="356" text-anchor="middle" class="small">JWT + email_marketing</text>
  <text x="210" y="376" text-anchor="middle" class="small">service access</text>

  <rect x="105" y="430" width="210" height="86" class="node node-blue"/>
  <text x="210" y="460" text-anchor="middle" class="label">Load module data</text>
  <text x="210" y="482" text-anchor="middle" class="small">campaigns, templates,</text>
  <text x="210" y="502" text-anchor="middle" class="small">contacts, domains</text>

  <rect x="105" y="560" width="210" height="82" class="node node-blue"/>
  <text x="210" y="590" text-anchor="middle" class="label">Create campaign</text>
  <text x="210" y="612" text-anchor="middle" class="small">subject, sender, body,</text>
  <text x="210" y="632" text-anchor="middle" class="small">audience filter</text>

  <rect x="445" y="560" width="230" height="82" class="node"/>
  <text x="560" y="590" text-anchor="middle" class="label">POST /email/campaigns</text>
  <text x="560" y="612" text-anchor="middle" class="small">Creates draft campaign</text>
  <text x="560" y="632" text-anchor="middle" class="small">scoped to tenant</text>

  <rect x="795" y="560" width="210" height="82" class="node node-purple"/>
  <text x="900" y="590" text-anchor="middle" class="label">EmailCampaign</text>
  <text x="900" y="612" text-anchor="middle" class="small">Stored as draft</text>
  <text x="900" y="632" text-anchor="middle" class="small">with recipientFilter</text>

  <polygon points="560,700 680,765 560,830 440,765" class="decision"/>
  <text x="560" y="757" text-anchor="middle" class="label">Send now</text>
  <text x="560" y="779" text-anchor="middle" class="label">or schedule?</text>

  <rect x="410" y="880" width="230" height="78" class="node"/>
  <text x="525" y="910" text-anchor="middle" class="label">POST /send-now</text>
  <text x="525" y="932" text-anchor="middle" class="small">Immediate queue request</text>

  <rect x="410" y="1000" width="230" height="78" class="node"/>
  <text x="525" y="1030" text-anchor="middle" class="label">POST /schedule</text>
  <text x="525" y="1052" text-anchor="middle" class="small">Requires future date</text>

  <rect x="445" y="1115" width="230" height="100" class="node node-amber"/>
  <text x="560" y="1144" text-anchor="middle" class="label">Readiness validation</text>
  <text x="560" y="1166" text-anchor="middle" class="small">audience, suppression,</text>
  <text x="560" y="1186" text-anchor="middle" class="small">sender domain, content,</text>
  <text x="560" y="1206" text-anchor="middle" class="small">address, consent</text>

  <polygon points="900,1115 1010,1175 900,1235 790,1175" class="decision"/>
  <text x="900" y="1169" text-anchor="middle" class="label">Ready?</text>
  <text x="900" y="1191" text-anchor="middle" class="small">blocking errors?</text>

  <rect x="795" y="1265" width="210" height="82" class="node node-red"/>
  <text x="900" y="1295" text-anchor="middle" class="label">Return errors</text>
  <text x="900" y="1317" text-anchor="middle" class="small">User fixes setup</text>
  <text x="900" y="1337" text-anchor="middle" class="small">then retries</text>

  <rect x="795" y="880" width="210" height="86" class="node node-purple"/>
  <text x="900" y="910" text-anchor="middle" class="label">Build recipients</text>
  <text x="900" y="932" text-anchor="middle" class="small">opted-in CRM contacts</text>
  <text x="900" y="952" text-anchor="middle" class="small">minus suppressions</text>

  <rect x="795" y="760" width="210" height="82" class="node node-purple"/>
  <text x="900" y="790" text-anchor="middle" class="label">Save queue state</text>
  <text x="900" y="812" text-anchor="middle" class="small">CampaignRecipient rows</text>
  <text x="900" y="832" text-anchor="middle" class="small">status queued</text>

  <rect x="795" y="660" width="210" height="66" class="node node-purple"/>
  <text x="900" y="690" text-anchor="middle" class="label">BullMQ job</text>
  <text x="900" y="712" text-anchor="middle" class="small">email-campaigns</text>

  <rect x="1100" y="660" width="210" height="82" class="node node-green"/>
  <text x="1205" y="690" text-anchor="middle" class="label">Worker consumes job</text>
  <text x="1205" y="712" text-anchor="middle" class="small">sets campaign sending</text>
  <text x="1205" y="732" text-anchor="middle" class="small">reads queued recipients</text>

  <rect x="1100" y="785" width="210" height="88" class="node node-green"/>
  <text x="1205" y="815" text-anchor="middle" class="label">Prepare email</text>
  <text x="1205" y="837" text-anchor="middle" class="small">tracking links, open pixel,</text>
  <text x="1205" y="857" text-anchor="middle" class="small">unsubscribe link</text>

  <rect x="1100" y="915" width="210" height="78" class="node node-green"/>
  <text x="1205" y="945" text-anchor="middle" class="label">Send via SendGrid</text>
  <text x="1205" y="967" text-anchor="middle" class="small">one recipient at a time</text>

  <polygon points="1205,1038 1310,1096 1205,1154 1100,1096" class="decision"/>
  <text x="1205" y="1090" text-anchor="middle" class="label">Accepted?</text>
  <text x="1205" y="1112" text-anchor="middle" class="small">provider response</text>

  <rect x="1085" y="1200" width="240" height="82" class="node node-green"/>
  <text x="1205" y="1230" text-anchor="middle" class="label">Success path</text>
  <text x="1205" y="1252" text-anchor="middle" class="small">recipient sent + delivered</text>
  <text x="1205" y="1272" text-anchor="middle" class="small">event/provider log</text>

  <rect x="1085" y="1330" width="240" height="82" class="node node-red"/>
  <text x="1205" y="1360" text-anchor="middle" class="label">Failure path</text>
  <text x="1205" y="1382" text-anchor="middle" class="small">retry up to 3 attempts</text>
  <text x="1205" y="1402" text-anchor="middle" class="small">or mark failed</text>

  <rect x="795" y="1410" width="210" height="66" class="node node-purple"/>
  <text x="900" y="1438" text-anchor="middle" class="label">Final campaign status</text>
  <text x="900" y="1460" text-anchor="middle" class="small">sent or partial_failed</text>

  <rect x="105" y="1220" width="210" height="86" class="node node-blue"/>
  <text x="210" y="1250" text-anchor="middle" class="label">Recipient action</text>
  <text x="210" y="1272" text-anchor="middle" class="small">open, click, unsubscribe</text>
  <text x="210" y="1292" text-anchor="middle" class="small">or provider webhook</text>

  <rect x="445" y="1285" width="230" height="86" class="node"/>
  <text x="560" y="1315" text-anchor="middle" class="label">Tracking endpoints</text>
  <text x="560" y="1337" text-anchor="middle" class="small">/email/events/open</text>
  <text x="560" y="1357" text-anchor="middle" class="small">click, unsubscribe, webhook</text>

  <rect x="795" y="1285" width="210" height="86" class="node node-purple"/>
  <text x="900" y="1315" text-anchor="middle" class="label">Update analytics</text>
  <text x="900" y="1337" text-anchor="middle" class="small">EmailEvent, counters,</text>
  <text x="900" y="1357" text-anchor="middle" class="small">suppression entries</text>

  <path d="M210 264 L210 305" class="edge"/>
  <path d="M210 387 L210 430" class="edge"/>
  <path d="M210 516 L210 560" class="edge"/>
  <path d="M315 601 L445 601" class="edge"/>
  <path d="M675 601 L795 601" class="edge"/>
  <path d="M900 642 L900 693 L680 693 L680 735" class="edge"/>
  <path d="M530 830 L525 880" class="edge"/>
  <path d="M590 830 L590 970 L525 1000" class="edge"/>
  <text x="450" y="856" class="edge-label">now</text>
  <text x="614" y="878" class="edge-label">later</text>
  <path d="M525 958 L525 1115" class="edge"/>
  <path d="M525 1078 L560 1115" class="edge"/>
  <path d="M675 1165 L790 1175" class="edge"/>
  <path d="M900 1235 L900 1265" class="edge"/>
  <text x="918" y="1256" class="edge-label">no</text>
  <path d="M900 1115 L900 966" class="edge"/>
  <text x="918" y="1050" class="edge-label">yes</text>
  <path d="M900 880 L900 842" class="edge"/>
  <path d="M900 760 L900 726" class="edge"/>
  <path d="M1005 693 L1100 701" class="edge"/>
  <path d="M1205 742 L1205 785" class="edge"/>
  <path d="M1205 873 L1205 915" class="edge"/>
  <path d="M1205 993 L1205 1038" class="edge"/>
  <path d="M1205 1154 L1205 1200" class="edge"/>
  <text x="1220" y="1184" class="edge-label">yes</text>
  <path d="M1310 1096 L1360 1096 L1360 1371 L1325 1371" class="edge"/>
  <text x="1322" y="1084" class="edge-label">no</text>
  <path d="M1205 1282 L1205 1443 L1005 1443" class="edge"/>
  <path d="M1085 1371 L1005 1443" class="edge"/>
  <path d="M210 1306 L210 1328 L445 1328" class="edge-muted"/>
  <path d="M675 1328 L795 1328" class="edge-muted"/>
</svg>
