name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint & Typecheck ───────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install API dependencies
        run: cd apps/api && npm ci --ignore-scripts

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate

      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit

      - name: Build frontend
        run: npx vite build

  # ── API Tests ──────────────────────────────────────────
  test:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexushq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexushq_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-access-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod
      ENCRYPTION_KEY: ci-test-encryption-key-32bytes!!
      CORS_ORIGINS: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API dependencies
        run: cd apps/api && npm ci --ignore-scripts

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate

      - name: Run migrations
        run: cd apps/api && npx prisma migrate deploy

      - name: Run tests
        run: cd apps/api && npm test -- --passWithNoTests

  # ── Security Audit ─────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Audit root dependencies
        run: npm audit --audit-level=critical || true

      - name: Audit API dependencies
        run: cd apps/api && npm audit --audit-level=critical || true

  # ── Docker Build ───────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t nexushq-api:${{ github.sha }} .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t nexushq-web:${{ github.sha }} --build-arg VITE_API_URL=/api .
